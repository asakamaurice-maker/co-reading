<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>共读小屋</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=LXGW+WenKai:wght@300;400;700&family=Ma+Shan+Zheng&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #FAF7F2;
  --card-bg: #FFFDF9;
  --border: #E8DFD4;
  --accent: #B8860B;
  --accent-light: #D4A84B;
  --text: #3A3028;
  --text-muted: #8C7B6B;
  --claude-bg: #EBF1F8;
  --claude-border: #C4D8EC;
  --claude-accent: #5B7FA5;
  --nainai-bg: #FDF5EE;
  --nainai-border: #E8D5C4;
  --nainai-accent: #A0775A;
  --shadow-sm: 0 1px 3px rgba(139,115,85,.06);
  --shadow-md: 0 4px 12px rgba(139,115,85,.08);
  --shadow-lg: 0 8px 24px rgba(139,115,85,.12);
  --radius: 12px;
  --radius-lg: 16px;
}

body{
  font-family:'LXGW WenKai',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);overflow-x:hidden;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(184,134,11,.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(139,115,85,.03) 0%, transparent 50%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
}
button{font-family:'LXGW WenKai',-apple-system,sans-serif;-webkit-appearance:none;transition:all .2s ease}
input,textarea{font-family:'LXGW WenKai',-apple-system,sans-serif;-webkit-appearance:none;transition:border-color .2s ease}
input:focus,textarea:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(184,134,11,.1)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Decorative flourish SVG (reusable) ── */
.flourish{
  display:block;margin:0 auto;
  width:120px;height:16px;
  opacity:.35;
}
.flourish-sm{width:80px;height:12px;opacity:.25}

/* ── Header ── */
.hd{
  padding:16px 20px;
  background:rgba(255,253,249,.95);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
  box-shadow:0 1px 8px rgba(139,115,85,.06);
}
.hd h1{
  font-family:'Playfair Display','Noto Serif SC',serif;
  font-size:22px;color:var(--accent);letter-spacing:3px;font-weight:700;
  font-style:italic;
}
.hd h1 .title-icon{
  display:inline-block;font-style:normal;margin-right:6px;font-size:18px;
  animation:gentleSway 4s ease-in-out infinite;
}
@keyframes gentleSway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
.hd small{font-size:11px;color:var(--text-muted);display:block;margin-top:3px;letter-spacing:.5px}

/* ── Buttons ── */
.pri{
  padding:10px 20px;border-radius:22px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent-light));
  color:#fff;font-size:13px;cursor:pointer;font-weight:600;
  box-shadow:0 2px 8px rgba(184,134,11,.2);
  letter-spacing:.5px;
  position:relative;overflow:hidden;
}
.pri::after{
  content:'';position:absolute;top:0;left:-100%;
  width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
  transition:left .5s ease;
}
.pri:active{transform:scale(.97)}
.pri:active::after{left:100%}

.btn{
  padding:8px 16px;border-radius:20px;
  border:1px solid var(--border);background:var(--card-bg);
  color:var(--text);font-size:13px;cursor:pointer;
}
.btn:active{background:var(--bg)}

.sm{
  padding:6px 14px;border-radius:16px;
  border:1px solid var(--border);background:var(--card-bg);
  font-size:11px;cursor:pointer;letter-spacing:.3px;
}
.sm.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 6px rgba(184,134,11,.2)}

/* ── Modal ── */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:99;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.box{
  background:var(--card-bg);border-radius:var(--radius-lg);
  padding:28px;width:90%;max-width:400px;
  box-shadow:var(--shadow-lg);
  animation:modalIn .25s ease;
  position:relative;
  border:1px solid var(--border);
}
.box::before{
  content:'';position:absolute;top:8px;left:8px;right:8px;bottom:8px;
  border:1px solid rgba(184,134,11,.08);border-radius:10px;
  pointer-events:none;
}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.box h2{font-family:'Ma Shan Zheng','Noto Serif SC',serif;font-size:22px;color:var(--accent);margin:0 0 20px;letter-spacing:2px;text-align:center}
.box label{font-size:12px;color:var(--text-muted);display:block;margin:12px 0 5px;font-weight:600}
.box input[type=text]{width:100%;padding:10px 13px;border-radius:10px;border:1px solid var(--border);font-size:14px;background:var(--bg)}

/* ── Book Grid ── */
.shelf-title{
  font-family:'Playfair Display','Noto Serif SC',serif;
  font-size:13px;color:var(--text-muted);
  letter-spacing:2px;padding:8px 0 4px;
  border-bottom:1px solid var(--border);margin-bottom:22px;
  font-style:italic;
  display:flex;align-items:center;gap:8px;
}
.shelf-title .shelf-icon{font-style:normal;font-size:15px}
.grid{display:flex;flex-wrap:wrap;gap:18px;justify-content:flex-start}

.card-wrap{position:relative}

.card{
  width:120px;height:170px;
  border-radius:3px 10px 10px 3px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:16px 12px;position:relative;overflow:hidden;cursor:pointer;
  box-shadow:3px 4px 14px rgba(139,115,85,.12);
  transition:box-shadow .2s ease,transform .2s ease;
}
.card:active{transform:scale(.97)}
.card .sp{position:absolute;left:0;top:0;bottom:0;width:5px;background:rgba(0,0,0,.18)}
.card .spine-lines{
  position:absolute;left:6px;top:15%;bottom:15%;width:1px;
  background:repeating-linear-gradient(to bottom,rgba(255,255,255,.12) 0,rgba(255,255,255,.12) 3px,transparent 3px,transparent 8px);
}
/* decorative corner on book cards */
.card::after{
  content:'';position:absolute;top:8px;right:8px;
  width:16px;height:16px;
  border-top:1px solid rgba(255,255,255,.2);
  border-right:1px solid rgba(255,255,255,.2);
  border-radius:0 4px 0 0;
}
.card span{
  font-family:'Noto Serif SC',serif;font-size:13px;font-weight:700;
  color:#fff;text-align:center;line-height:1.6;
  text-shadow:0 1px 3px rgba(0,0,0,.25);word-break:break-all;
}
.card small{font-size:9px;color:rgba(255,255,255,.7);margin-top:8px;letter-spacing:.3px}

.del{
  position:absolute;top:-5px;right:-5px;
  width:22px;height:22px;border-radius:50%;border:none;
  background:#D35452;color:#fff;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(211,84,82,.3);
  opacity:0;transition:opacity .2s ease;
}
.card-wrap:active .del{opacity:1}
@media(hover:hover){.card-wrap:hover .del{opacity:1}}

/* ── Reader Header ── */
.rhd{
  padding:10px 12px;
  background:rgba(255,253,249,.95);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;
  position:sticky;top:0;z-index:10;
  box-shadow:0 1px 6px rgba(139,115,85,.05);
}
.ti{flex:1;text-align:center;min-width:0}
.ti h3{font-family:'Noto Serif SC',serif;font-size:13px;color:var(--accent);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti small{font-size:10px;color:var(--text-muted)}

/* ── Reading area: paper feel ── */
.read-area{
  overflow-y:auto;
  height:calc(100vh - 48px);height:calc(100dvh - 48px);
  -webkit-overflow-scrolling:touch;
  display:flex;justify-content:center;
  background:
    linear-gradient(to right, rgba(139,115,85,.04) 0%, transparent 3%, transparent 97%, rgba(139,115,85,.04) 100%),
    linear-gradient(to bottom, rgba(139,115,85,.03) 0%, transparent 2%);
}
.read-inner{
  max-width:620px;width:100%;
  padding:32px 20px 20px;
  position:relative;
}

/* ── Chapter title with decorative ornament ── */
.cht{
  font-family:'Ma Shan Zheng','Noto Serif SC',serif;
  font-size:22px;font-weight:400;
  text-align:center;margin-bottom:12px;color:var(--text);
  letter-spacing:3px;line-height:1.6;
}
.ch-ornament{
  display:block;text-align:center;margin-bottom:28px;
  color:var(--accent);opacity:.4;font-size:14px;letter-spacing:8px;
}

/* ── Paragraph ── */
.pa{
  font-family:'Noto Serif SC',serif;font-size:15px;line-height:2.1;
  text-indent:2em;padding:6px 10px;margin:0 0 2px;
  cursor:pointer;border-radius:6px;
  border-left:3px solid transparent;
  position:relative;
  transition:background .15s ease;
}
.pa:active{background:rgba(184,134,11,.06)}
.pa.hl{
  background:linear-gradient(to right,rgba(184,134,11,.05),rgba(253,245,238,.5));
  border-left-color:var(--accent);
}
.pa .bc{
  position:absolute;right:6px;top:6px;
  font-size:9px;color:var(--accent);
  background:rgba(184,134,11,.1);
  padding:2px 7px;border-radius:10px;
  font-family:'LXGW WenKai',sans-serif;
}

/* ── Unread indicator: glowing bar ── */
.pa .unread-bar{
  position:absolute;left:-3px;top:8px;bottom:8px;width:3px;
  border-radius:2px;
  background:linear-gradient(to bottom,var(--claude-accent),#7BA3CC);
  box-shadow:0 0 8px rgba(91,127,165,.5), 0 0 3px rgba(91,127,165,.3);
  animation:unreadGlow 2.5s ease-in-out infinite;
}
@keyframes unreadGlow{
  0%,100%{opacity:1;box-shadow:0 0 8px rgba(91,127,165,.5), 0 0 3px rgba(91,127,165,.3)}
  50%{opacity:.7;box-shadow:0 0 4px rgba(91,127,165,.3), 0 0 2px rgba(91,127,165,.2)}
}
.pa .unread-badge{
  position:absolute;left:-28px;top:8px;
  font-size:8px;color:#fff;
  background:var(--claude-accent);
  padding:2px 5px;border-radius:6px;
  white-space:nowrap;letter-spacing:.3px;
  box-shadow:0 1px 4px rgba(91,127,165,.3);
  font-family:'LXGW WenKai',sans-serif;
}

/* ── Annotations ── */
.an{padding:10px 6px 10px 10px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.bub{
  padding:12px 14px;border-radius:var(--radius);margin-bottom:8px;
  position:relative;
  animation:bubIn .2s ease;
}
@keyframes bubIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.bub.me{
  background:linear-gradient(135deg,#FDF5EE,#FBF0E4);
  border:1px solid var(--nainai-border);
  box-shadow:0 1px 4px rgba(160,119,90,.06);
}
.bub.cl{
  background:linear-gradient(135deg,#EBF1F8,#E3ECF5);
  border:1px solid var(--claude-border);
  box-shadow:0 1px 4px rgba(91,127,165,.06);
}
.bub.cl.unread-bub{
  border-color:var(--claude-accent);
  box-shadow:0 1px 8px rgba(91,127,165,.15);
}

.bub .nm{font-size:11px;font-weight:700;letter-spacing:.3px}
.bub .nm.n{color:var(--nainai-accent)}
.bub .nm.c{color:var(--claude-accent)}
.bub .avatar{
  display:inline-block;width:16px;height:16px;
  vertical-align:middle;margin-right:4px;
  border-radius:50%;font-size:10px;line-height:16px;text-align:center;
}
.bub .avatar.av-n{background:rgba(160,119,90,.12)}
.bub .avatar.av-c{background:rgba(91,127,165,.12)}
.bub .tm{font-size:10px;color:var(--text-muted);margin-left:8px}

.bub .hl2{
  font-size:11px;color:var(--text-muted);font-style:italic;
  padding:4px 10px;margin:6px 0 8px;line-height:1.6;
  border-radius:4px;
}
.bub .hl2.n{border-left:2px solid var(--nainai-accent);background:rgba(160,119,90,.04)}
.bub .hl2.c{border-left:2px solid var(--claude-accent);background:rgba(91,127,165,.04)}

.bub .ct{font-size:13.5px;line-height:1.9;margin-top:5px}

.bub .dl{
  position:absolute;top:8px;right:8px;
  background:none;border:none;color:var(--text-muted);
  font-size:10px;cursor:pointer;opacity:.3;
}

/* ── Comment input ── */
.cr{display:flex;gap:8px;margin-top:6px;align-items:flex-end}
.cr textarea{
  flex:1;padding:10px 12px;border-radius:var(--radius);
  border:1px solid var(--border);font-size:13px;
  resize:none;height:48px;background:var(--card-bg);
  line-height:1.6;
}
.cr .send-btn{
  padding:8px 14px;border-radius:var(--radius);border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent-light));
  color:#fff;font-size:11px;font-weight:600;
  cursor:pointer;white-space:nowrap;height:36px;
  box-shadow:0 2px 6px rgba(184,134,11,.15);
}

/* ── Progress bar ── */
.progress-wrap{
  position:fixed;bottom:0;left:0;right:0;height:3px;
  background:rgba(232,223,212,.5);z-index:20;
}
.progress-bar{
  height:100%;background:linear-gradient(to right,var(--accent),var(--accent-light));
  border-radius:0 2px 2px 0;
  transition:width .3s ease;
}

/* ── Nav with decorative divider ── */
.nv{
  display:flex;justify-content:space-between;align-items:center;
  padding:28px 0 60px;
  margin-top:32px;position:relative;
}
.nv::before{
  content:'\2766  \2766  \2766';
  position:absolute;top:-6px;left:50%;transform:translateX(-50%);
  font-size:10px;color:var(--accent);opacity:.25;letter-spacing:6px;
}
.nv .page-info{font-size:11px;color:var(--text-muted);letter-spacing:.5px}

/* ── TOC ── */
.toc{
  position:fixed;top:0;left:0;bottom:0;width:260px;
  background:var(--card-bg);z-index:50;overflow-y:auto;
  padding:18px;box-shadow:8px 0 24px rgba(0,0,0,.08);
  animation:tocIn .2s ease;
}
@keyframes tocIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.toc-bg{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:49;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.toc h3{
  font-family:'Ma Shan Zheng','Noto Serif SC',serif;
  font-size:18px;color:var(--accent);margin-bottom:14px;letter-spacing:2px;
}
.toc-i{
  padding:8px 10px;border-radius:8px;font-size:12px;
  cursor:pointer;margin-bottom:3px;line-height:1.5;
  color:var(--text);display:flex;align-items:center;
}
.toc-i:active{background:rgba(184,134,11,.08)}
.toc-i.cur{background:rgba(184,134,11,.1);color:var(--accent);font-weight:600}
.toc-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--claude-accent);
  box-shadow:0 0 4px rgba(91,127,165,.3);
  margin-right:8px;flex-shrink:0;
}

/* ── Empty state ── */
.empty{text-align:center;padding:80px 20px}
.empty .deco-book{
  font-size:52px;margin-bottom:16px;
  display:inline-block;
  animation:floatBook 3s ease-in-out infinite;
}
@keyframes floatBook{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.empty h3{
  font-family:'Ma Shan Zheng','Noto Serif SC',serif;
  font-size:22px;margin-bottom:8px;color:var(--text);letter-spacing:2px;
}
.empty p{font-size:13px;color:var(--text-muted);margin:0 0 20px;line-height:1.8}
.empty .deco-line{
  display:block;margin:14px auto 20px;
  color:var(--accent);opacity:.3;font-size:12px;letter-spacing:6px;
}

/* ── Reading progress memory indicator ── */
.last-read{
  font-size:10px;color:var(--accent);
  background:rgba(184,134,11,.08);
  padding:3px 8px;border-radius:8px;
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  white-space:nowrap;font-family:'LXGW WenKai',sans-serif;
}

/* ── Loading overlay ── */
.loading{
  position:fixed;inset:0;z-index:80;
  background:rgba(250,247,242,.85);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;
}
.loading .load-icon{
  font-size:28px;
  animation:loadSpin 2s linear infinite;
}
@keyframes loadSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.loading span{font-size:12px;color:var(--text-muted);letter-spacing:.5px;font-style:italic}

/* ── Footer watermark ── */
.footer-mark{
  text-align:center;padding:24px 0 40px;
  font-size:10px;color:var(--text-muted);opacity:.4;
  letter-spacing:2px;
  font-family:'Playfair Display',serif;
  font-style:italic;
}

/* ── Mobile ── */
@media(max-width:480px){
  .grid{gap:14px}
  .card{width:105px;height:152px;padding:14px 10px}
  .card span{font-size:12px}
  .read-inner{padding:24px 14px 16px}
  .pa{font-size:14.5px;padding:5px 8px}
  .pa .unread-badge{left:-22px;font-size:7px;padding:1px 4px}
  .bub .ct{font-size:13px}
  .toc{width:75vw;max-width:260px}
  .hd h1{font-size:19px}
}
</style>
</head>
<body>

<div id="shelf">
  <div class="hd">
    <div><h1><span class="title-icon">&#x1F3E0;</span>共读小屋</h1><small id="sub">柰柰 & Claude 的阅读角</small></div>
    <button class="pri" onclick="openModal()">+ 新书</button>
  </div>
  <div id="main" style="padding:24px 18px"></div>
</div>

<div id="reader" style="display:none"></div>
<div id="toc-bg" class="toc-bg" style="display:none" onclick="hideToc()"></div>
<div id="toc" class="toc" style="display:none"></div>
<div id="progress" class="progress-wrap" style="display:none"><div class="progress-bar" id="pbar"></div></div>
<div id="loading" class="loading" style="display:none"><div class="load-icon">&#x1F4D6;</div><span>正在翻开...</span></div>

<div id="modal" class="overlay" style="display:none">
  <div class="box">
    <h2>添加新书</h2>
    <label>书名</label><input type="text" id="m-title">
    <label>作者（选填）</label><input type="text" id="m-author">
    <label>上传 TXT 文件</label>
    <input type="file" accept=".txt" id="m-file" style="font-size:12px;margin-top:6px" onchange="onFile(this)">
    <div id="m-info" style="font-size:12px;color:var(--text-muted);margin-top:8px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="pri" id="m-go" onclick="upload()">开始阅读</button>
    </div>
  </div>
</div>

<script>
try {

var SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrb21zZHdhc292aWNjanFoaXN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDYwNzAsImV4cCI6MjA4ODY4MjA3MH0.hsk23LotAH3-C7j4ytcT6ABqMVfniC_byxAcGwfDKp8";
var SUPA_HDRS = {"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Prefer":"return=representation"};

var _ft = "";
var _books = [];

var _chs = [];

var _cloud = false;

// ── Unread tracking ──
function getReadKey(chId) { return "cr4-read-" + chId; }
function getLastReadIds(chId) {
  try { var r = localStorage.getItem(getReadKey(chId)); return r ? JSON.parse(r) : []; } catch(e) { return []; }
}
function markChapterRead(chId, annos) {
  var ids = annos.filter(function(a){ return a.author === "claude"; }).map(function(a){ return a.id; });
  try { localStorage.setItem(getReadKey(chId), JSON.stringify(ids)); } catch(e) {}
}
function getUnreadParagraphs(chId, annos) {
  var readIds = getLastReadIds(chId);
  var pis = {};
  annos.forEach(function(a){
    if (a.author === "claude" && readIds.indexOf(a.id) === -1) pis[a.paragraph_index] = true;
  });
  return pis;
}
function isAnnoUnread(chId, anno) {
  if (anno.author !== "claude") return false;
  var readIds = getLastReadIds(chId);
  return readIds.indexOf(anno.id) === -1;
}

// ── Reading progress ──
function saveProgress(bookId, ci) {
  try { localStorage.setItem("cr4-prog-" + bookId, String(ci)); } catch(e) {}
}
function getProgress(bookId) {
  try { var v = localStorage.getItem("cr4-prog-" + bookId); return v !== null ? parseInt(v) : -1; } catch(e) { return -1; }
}

function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function fmtTime(iso) {
  try { return new Date(iso).toLocaleString("zh-CN",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}); }
  catch(e) { return ""; }
}

// ── Smart chapter parser ──
function parse(raw) {
  var result = parseByPattern(raw, /^第[一二三四五六七八九十百千零\d]+[章回节卷篇]/);
  if (result.length > 1) return result;
  var tocResult = parseByTOC(raw);
  if (tocResult.length > 1) return tocResult;
  result = parseByPattern(raw, /^(?:Chapter|CHAPTER|chapter)\s+\d+/i);
  if (result.length > 1) return result;
  var headingResult = parseByHeadings(raw);
  if (headingResult.length > 1) return headingResult;
  result = parseByPattern(raw, /^\d{1,3}$/);
  if (result.length > 1) return result;
  if (raw.trim().length > 8000) {
    return splitBySize(raw, 4000);
  }
  return [{t:"全文", c:raw.trim()}];
}

function parseByPattern(raw, regex) {
  var lines = raw.split(/\r?\n/);
  var out = [], t = "前言", buf = [];
  for (var i = 0; i < lines.length; i++) {
    var tr = lines[i].trim();
    if (regex.test(tr)) {
      if (buf.length > 0) { var c = buf.join("\n").trim(); if (c.length > 50) out.push({t:t, c:c}); }
      t = tr.length > 40 ? tr.slice(0, 40) : tr;
      buf = [];
    } else { buf.push(lines[i]); }
  }
  if (buf.length > 0) { var c2 = buf.join("\n").trim(); if (c2.length > 50) out.push({t:t, c:c2}); }
  return out;
}

function parseByTOC(raw) {
  var lines = raw.split(/\r?\n/);
  var tocStart = -1;
  for (var i = 0; i < Math.min(60, lines.length); i++) {
    if (/^目录\s*$/.test(lines[i].trim()) || /^目\s*录\s*$/.test(lines[i].trim())) {
      tocStart = i + 1;
      break;
    }
  }
  if (tocStart < 0) return [];
  var tocEntries = [];
  for (var i = tocStart; i < lines.length; i++) {
    var l = lines[i].trim();
    if (!l) continue;
    if (l.length > 30) break;
    if (/^(?:封面|版权|目录|前言|序言|序|后记|附录)\s*$/.test(l)) continue;
    tocEntries.push(l);
    if (tocEntries.length > 80) break;
  }
  if (tocEntries.length < 2) return [];
  var out = [];
  var fullText = raw;
  var lastIdx = 0;
  var lastTitle = "前言";
  for (var i = 0; i < tocEntries.length; i++) {
    var entry = tocEntries[i];
    var searchFrom = raw.indexOf(entry, lastIdx > 200 ? lastIdx : 200);
    if (searchFrom < 0) continue;
    var lineStart = raw.lastIndexOf('\n', searchFrom);
    var lineEnd = raw.indexOf('\n', searchFrom);
    if (lineEnd < 0) lineEnd = raw.length;
    var fullLine = raw.substring(lineStart + 1, lineEnd).trim();
    if (fullLine.length > 40) continue;
    if (lastIdx < searchFrom) {
      var chunk = raw.substring(lastIdx, searchFrom).trim();
      if (out.length === 0) {
        var tocEnd = raw.indexOf(tocEntries[tocEntries.length - 1]);
        if (tocEnd > 0) {
          tocEnd = raw.indexOf('\n', tocEnd);
          if (tocEnd > 0 && tocEnd < searchFrom) {
            chunk = raw.substring(tocEnd, searchFrom).trim();
          }
        }
      }
      if (chunk.length > 50) out.push({t: lastTitle, c: chunk});
    }
    lastTitle = entry;
    lastIdx = searchFrom;
  }
  if (lastIdx < raw.length) {
    var chunk = raw.substring(lastIdx).trim();
    var nl = chunk.indexOf('\n');
    if (nl > 0 && nl < 60) chunk = chunk.substring(nl).trim();
    if (chunk.length > 50) out.push({t: lastTitle, c: chunk});
  }
  return out;
}

function parseByHeadings(raw) {
  var lines = raw.split(/\r?\n/);
  var candidates = [];
  for (var i = 1; i < lines.length - 1; i++) {
    var l = lines[i].trim();
    var prevEmpty = !lines[i-1].trim();
    var nextEmpty = (i + 1 < lines.length) ? !lines[i+1].trim() : true;
    if (l && l.length >= 2 && l.length <= 25 && prevEmpty && nextEmpty) {
      if (/^[""「『]/.test(l)) continue;
      if (/[。，！？；]$/.test(l)) continue;
      candidates.push({line: i, title: l});
    }
  }
  if (candidates.length < 2) return [];
  var out = [];
  var lastLine = 0;
  var lastTitle = "前言";
  for (var i = 0; i < candidates.length; i++) {
    var buf = [];
    for (var j = lastLine; j < candidates[i].line; j++) buf.push(lines[j]);
    var c = buf.join("\n").trim();
    if (c.length > 50) out.push({t: lastTitle, c: c});
    lastTitle = candidates[i].title;
    lastLine = candidates[i].line + 1;
  }
  var buf = [];
  for (var j = lastLine; j < lines.length; j++) buf.push(lines[j]);
  var c = buf.join("\n").trim();
  if (c.length > 50) out.push({t: lastTitle, c: c});
  return out;
}

function splitBySize(raw, targetSize) {
  var paras = raw.split(/\n+/).filter(function(p){ return p.trim(); });
  var out = [], buf = [], len = 0, n = 1;
  for (var i = 0; i < paras.length; i++) {
    buf.push(paras[i]);
    len += paras[i].length;
    if (len >= targetSize && i < paras.length - 1) {
      out.push({t: "第 " + n + " 节", c: buf.join("\n")});
      buf = []; len = 0; n++;
    }
  }
  if (buf.length > 0) out.push({t: "第 " + n + " 节", c: buf.join("\n")});
  return out;
}

function supaFetch(path, method, body) {
  return new Promise(function(resolve, reject) {
    var timer = setTimeout(function(){ reject(new Error("timeout")); }, 15000);
    var opts = {method: method || "GET", headers: SUPA_HDRS};
    if (body) opts.body = JSON.stringify(body);
    fetch(SUPA_URL + path, opts).then(function(r) {
      clearTimeout(timer);
      if (!r.ok) { r.text().then(function(t){ reject(new Error(t)); }); return; }
      r.text().then(function(t){ resolve(t ? JSON.parse(t) : []); });
    }).catch(function(e) { clearTimeout(timer); reject(e); });
  });
}

function getScroll() { var sc = document.getElementById("rscroll"); return sc ? sc.scrollTop : 0; }
function setScroll(val) { var sc = document.getElementById("rscroll"); if (sc) sc.scrollTop = val; }

function refreshReader() {
  var scrollPos = getScroll();
  var savedP = _openP;
  showReader(true);
  _openP = savedP;
  setScroll(scrollPos);
  var el = document.getElementById("an-" + savedP);
  if (el) el.style.display = "block";
}

// ── Modal ──
function openModal() { document.getElementById("modal").style.display = "flex"; _ft = ""; }
function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("m-title").value = "";
  document.getElementById("m-author").value = "";
  document.getElementById("m-file").value = "";
  document.getElementById("m-info").textContent = "";
  document.getElementById("m-go").textContent = "开始阅读";
  document.getElementById("m-go").disabled = false;
  _ft = "";
}
function onFile(el) {
  var f = el.files[0]; if (!f) return;
  var r = new FileReader();
  r.onload = function(ev) {
    _ft = ev.target.result;
    var chs = parse(_ft);
    document.getElementById("m-info").textContent = "已读取 " + _ft.length + " 字，识别到 " + chs.length + " 个章节";
  };
  r.readAsText(f, "UTF-8");
  if (!document.getElementById("m-title").value) document.getElementById("m-title").value = f.name.replace(/\.txt$/i,"");
}

function upload() {
  var title = document.getElementById("m-title").value.trim();
  var author = document.getElementById("m-author").value.trim();
  if (!title || !_ft) { alert("请填写书名并上传文件"); return; }
  var goBtn = document.getElementById("m-go");
  goBtn.textContent = "处理中..."; goBtn.disabled = true;
  var chs = parse(_ft);

  if (_cloud) {
    supaFetch("books", "POST", {title:title, author:author||null}).then(function(res) {
      var book = res[0];
      var batchSize = 20;
      function uploadBatch(start) {
        if (start >= chs.length) {
          goBtn.textContent = "加载章节...";
          supaFetch("chapters?book_id=eq." + book.id + "&order=chapter_number.asc", "GET").then(function(chData) {
            closeModal();
            _cur = book; _chs = chData; _ci = 0; _openP = -1; _annos = [];
            _books.unshift(book);
            showReader();
          }).catch(function(e) { alert("加载章节失败"); goBtn.textContent = "开始阅读"; goBtn.disabled = false; });
          return;
        }
        var end = Math.min(start + batchSize, chs.length);
        goBtn.textContent = "上传 " + end + "/" + chs.length;
        var batch = [];
        for (var j = start; j < end; j++) {
          batch.push({book_id:book.id, chapter_number:j+1, title:chs[j].t, content:chs[j].c});
        }
        supaFetch("chapters", "POST", batch).then(function() {
          uploadBatch(end);
        }).catch(function(e) { alert("上传章节失败: " + e.message); goBtn.textContent = "开始阅读"; goBtn.disabled = false; });
      }
      uploadBatch(0);
    }).catch(function(e) { alert("创建书籍失败: " + e.message); goBtn.textContent = "开始阅读"; goBtn.disabled = false; });
  } else {
    var id = "b" + Date.now();
    var meta = {id:id, title:title, author:author||null};
    _books.push(meta);
    try { localStorage.setItem("cr4-books", JSON.stringify(_books)); } catch(e) {}
    var chData = chs.map(function(c,i){ return {id:"ch_"+i, book_id:id, chapter_number:i+1, title:c.t, content:c.c}; });
    try { localStorage.setItem("cr4-ch-" + id, JSON.stringify(chData)); } catch(e) {}
    closeModal();
    _cur = meta; _chs = chData; _ci = 0; _openP = -1; _annos = [];
    showReader();
  }
}

// ── Shelf ──
function showShelf() {
  stopPoll();
  document.getElementById("reader").style.display = "none";
  document.getElementById("progress").style.display = "none";
  document.getElementById("shelf").style.display = "block";
  var el = document.getElementById("main");
  el.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-muted)">加载中...</div>';

  supaFetch("books?order=created_at.desc", "GET").then(function(data) {
    _books = data; _cloud = true;
    document.getElementById("sub").textContent = "柰柰 & Claude 的阅读角";
    renderShelf();
  }).catch(function(e) {
    _cloud = false;
    try { _books = JSON.parse(localStorage.getItem("cr4-books")) || []; } catch(e2) { _books = []; }
    document.getElementById("sub").textContent = "柰柰 & Claude 的阅读角 · 离线";
    renderShelf();
  });
}

function renderShelf() {
  var el = document.getElementById("main");
  if (_books.length === 0) {
    el.innerHTML = '<div class="empty"><div class="deco-book">📚</div><h3>书架还是空的</h3><span class="deco-line">❧ ☙ ❧</span><p>上传一本 TXT，开始我们的共读之旅</p><button class="pri" onclick="openModal()">上传第一本书</button></div>';
    return;
  }
  var cs = [
    ["#7B6B55","#9B8B6F"],["#5A6B4A","#7A8B6A"],["#4A5A7A","#6A7A9A"],
    ["#7A4A5B","#9A6A7B"],["#6B5A7A","#8B7A9A"],["#5A7B7B","#7A9B9B"],
  ];
  var h = '<div class="shelf-title"><span class="shelf-icon">📚</span> 我们的书架 · ' + _books.length + ' 本</div><div class="grid">';
  for (var i = 0; i < _books.length; i++) {
    var b = _books[i], ci = b.title.length % cs.length, co = cs[ci];
    var prog = getProgress(b.id);
    h += '<div class="card-wrap">';
    h += '<div class="card" style="background:linear-gradient(145deg,'+co[0]+','+co[1]+')" onclick="openBook('+i+')">';
    h += '<div class="sp"></div><div class="spine-lines"></div>';
    h += '<span>' + esc(b.title) + '</span>';
    if (b.author) h += '<small>' + esc(b.author) + '</small>';
    if (prog > 0) h += '<span class="last-read">📖 读到第' + (prog+1) + '章</span>';
    h += '</div>';
    h += '<button class="del" onclick="event.stopPropagation();delBook('+i+')">×</button>';
    h += '</div>';
  }
  h += '</div>';
  h += '<div class="footer-mark">❦ Co-Reading ❦</div>';
  el.innerHTML = h;
}

var _loading = false;
function showLoading() { _loading = true; document.getElementById("loading").style.display = "flex"; }
function hideLoading() { _loading = false; document.getElementById("loading").style.display = "none"; }

function openBook(idx) {
  if (_loading) return;
  var b = _books[idx];
  _cur = b;
  var prog = getProgress(b.id);
  if (_cloud) {
    showLoading();
    supaFetch("chapters?book_id=eq." + b.id + "&order=chapter_number.asc", "GET").then(function(data) {
      _chs = data;
      _ci = (prog >= 0 && prog < data.length) ? prog : 0;
      _openP = -1;
      loadAnnos();
    }).catch(function(e) { hideLoading(); alert("加载失败"); });
  } else {
    try { _chs = JSON.parse(localStorage.getItem("cr4-ch-" + b.id)) || []; } catch(e) { _chs = []; }
    _ci = (prog >= 0 && prog < _chs.length) ? prog : 0;
    try { _annos = JSON.parse(localStorage.getItem("cr4-an-" + b.id + "-" + _ci)) || []; } catch(e) { _annos = []; }
    _openP = -1;
    showReader();
  }
}

function delBook(idx) {
  if (!confirm("确定删除这本书吗？")) return;
  var b = _books[idx];
  if (_cloud) {
    supaFetch("books?id=eq." + b.id, "DELETE").then(function() {
      _books.splice(idx, 1); renderShelf();
    }).catch(function(e) { alert("删除失败"); });
  } else {
    try { localStorage.removeItem("cr4-ch-" + b.id); } catch(e) {}
    _books.splice(idx, 1);
    try { localStorage.setItem("cr4-books", JSON.stringify(_books)); } catch(e) {}
    renderShelf();
  }
}

function loadAnnos() {
  if (!_chs[_ci]) return;
  if (_cloud) {
    supaFetch("annotations?chapter_id=eq." + _chs[_ci].id + "&order=paragraph_index.asc,created_at.asc", "GET").then(function(data) {
      _annos = data; hideLoading(); showReader();
    }).catch(function(e) { _annos = []; hideLoading(); showReader(); });
  } else {
    try { _annos = JSON.parse(localStorage.getItem("cr4-an-" + _cur.id + "-" + _ci)) || []; } catch(e) { _annos = []; }
    showReader();
  }
}

// ── Reader ──
function showReader(isRefresh) {
  document.getElementById("shelf").style.display = "none";
  var ch = _chs[_ci]; if (!ch) return;
  var paras = ch.content.split(/\n+/).filter(function(p){ return p.trim(); });
  var unreadParas = getUnreadParagraphs(ch.id, _annos);

  saveProgress(_cur.id, _ci);

  var h = '<div class="rhd">';
  h += '<button class="sm" onclick="backToShelf()">← 书架</button>';
  h += '<div class="ti"><h3>' + esc(_cur.title) + '</h3>';
  h += '<small>' + esc(ch.title) + ' · ' + (_ci+1) + '/' + _chs.length + '</small></div>';
  h += '<button class="sm' + (_showA?' on':'') + '" onclick="toggleAnno()">✍ 批注</button>';
  h += '<button class="sm" onclick="showToc()">☰ 目录</button>';
  h += '</div>';

  h += '<div class="read-area" id="rscroll" onscroll="onReadScroll()">';
  h += '<div class="read-inner">';
  h += '<h2 class="cht">' + esc(ch.title) + '</h2>';
  h += '<div class="ch-ornament">• ◆ •</div>';

  for (var i = 0; i < paras.length; i++) {
    var pa = _annos.filter(function(a){ return a.paragraph_index === i; });
    var has = pa.length > 0;
    var isUnread = unreadParas[i];
    h += '<p class="pa' + (has?' hl':'') + '" onclick="toggleP('+i+')">';
    if (isUnread && _showA) {
      h += '<span class="unread-bar"></span>';
      h += '<span class="unread-badge">新回复</span>';
    }
    h += esc(paras[i]);
    if (has) h += '<span class="bc">' + pa.length + '条</span>';
    h += '</p>';
    h += '<div class="an" id="an-'+i+'" style="display:none">';
    for (var j = 0; j < pa.length; j++) {
      var a = pa[j], ic = a.author === "claude";
      var ubub = ic && isAnnoUnread(ch.id, a);
      h += '<div class="bub ' + (ic?'cl':'me') + (ubub?' unread-bub':'') + '">';
      h += '<button class="dl" onclick="event.stopPropagation();delAnno(\''+a.id+'\')">删除</button>';
      h += '<span class="avatar ' + (ic?'av-c':'av-n') + '">' + (ic?'🦀':'🐾') + '</span>';
      h += '<span class="nm ' + (ic?'c':'n') + '">' + (ic?'Claude':'柰柰') + '</span>';
      h += '<span class="tm">' + fmtTime(a.created_at) + '</span>';
      if (a.highlighted_text) h += '<div class="hl2 ' + (ic?'c':'n') + '">“' + esc(a.highlighted_text.slice(0,50)) + (a.highlighted_text.length>50?'...':'') + '”</div>';
      h += '<div class="ct">' + esc(a.content) + '</div></div>';
    }
    h += '<div class="cr"><textarea id="ta-'+i+'" placeholder="写下你的想法..."></textarea>';
    h += '<button class="send-btn" onclick="addAnno('+i+')">发送</button></div>';
    h += '</div>';
  }

  h += '<div class="nv">';
  h += '<button class="btn" style="font-size:12px;opacity:' + (_ci<=0?'.3':'1') + '" onclick="goCh('+(_ci-1)+')">← 上一章</button>';
  h += '<span class="page-info">' + (_ci+1) + ' / ' + _chs.length + '</span>';
  h += '<button class="btn" style="font-size:12px;opacity:' + (_ci>=_chs.length-1?'.3':'1') + '" onclick="goCh('+(_ci+1)+')">下一章 →</button>';
  h += '</div>';
  h += '<div class="footer-mark">❦ Co-Reading ❦</div>';
  h += '</div></div>';

  document.getElementById("reader").innerHTML = h;
  document.getElementById("reader").style.display = "block";
  document.getElementById("progress").style.display = "block";
  updateProgress();
  startPoll();
}

function onReadScroll() { updateProgress(); }
function updateProgress() {
  var sc = document.getElementById("rscroll");
  if (!sc) return;
  var pct = sc.scrollHeight <= sc.clientHeight ? 100 : Math.round(sc.scrollTop / (sc.scrollHeight - sc.clientHeight) * 100);
  var bar = document.getElementById("pbar");
  if (bar) bar.style.width = pct + "%";
}

function backToShelf() {
  var ch = _chs[_ci];
  if (ch) markChapterRead(ch.id, _annos);
  stopPoll();
  showShelf();
}

function toggleP(i) {
  if (!_showA) return;
  var ch = _chs[_ci];
  if (_openP >= 0) { var old = document.getElementById("an-" + _openP); if (old) old.style.display = "none"; }
  if (_openP === i) { _openP = -1; return; }
  _openP = i;
  var el = document.getElementById("an-" + i);
  if (el) el.style.display = "block";

  var paraAnnos = _annos.filter(function(a){ return a.paragraph_index === i && a.author === "claude"; });
  if (paraAnnos.length > 0 && ch) {
    var readIds = getLastReadIds(ch.id);
    var changed = false;
    paraAnnos.forEach(function(a){
      if (readIds.indexOf(a.id) === -1) { readIds.push(a.id); changed = true; }
    });
    if (changed) {
      try { localStorage.setItem(getReadKey(ch.id), JSON.stringify(readIds)); } catch(e) {}
      var pEl = el.previousElementSibling;
      if (pEl) {
        var bar = pEl.querySelector('.unread-bar');
        var badge = pEl.querySelector('.unread-badge');
        if (bar) bar.remove();
        if (badge) badge.remove();
        var ubs = el.querySelectorAll('.unread-bub');
        for (var k = 0; k < ubs.length; k++) ubs[k].classList.remove('unread-bub');
      }
    }
  }
}

function toggleAnno() { _showA = !_showA; _openP = -1; showReader(); }

function addAnno(pi) {
  var ta = document.getElementById("ta-" + pi);
  if (!ta || !ta.value.trim()) return;
  var ch = _chs[_ci];
  var paras = ch.content.split(/\n+/).filter(function(p){ return p.trim(); });
  var annoData = {
    chapter_id: ch.id, author: "nainai",
    content: ta.value.trim(),
    highlighted_text: (paras[pi]||"").slice(0,80),
    paragraph_index: pi
  };
  if (_cloud) {
    supaFetch("annotations", "POST", annoData).then(function(res) {
      _annos.push(res[0]); refreshReader();
    }).catch(function(e) { alert("评论失败: " + e.message); });
  } else {
    annoData.id = "a" + Date.now();
    annoData.created_at = new Date().toISOString();
    _annos.push(annoData);
    try { localStorage.setItem("cr4-an-" + _cur.id + "-" + _ci, JSON.stringify(_annos)); } catch(e) {}
    refreshReader();
  }
}

function delAnno(aid) {
  if (_cloud) {
    supaFetch("annotations?id=eq." + aid, "DELETE").then(function() {
      _annos = _annos.filter(function(a){ return a.id !== aid; }); refreshReader();
    }).catch(function(e) { alert("删除失败"); });
  } else {
    _annos = _annos.filter(function(a){ return a.id !== aid; });
    try { localStorage.setItem("cr4-an-" + _cur.id + "-" + _ci, JSON.stringify(_annos)); } catch(e) {}
    refreshReader();
  }
}

function goCh(n) {
  if (n < 0 || n >= _chs.length) return;
  var ch = _chs[_ci];
  if (ch) markChapterRead(ch.id, _annos);
  _ci = n; _openP = -1;
  if (_cloud) { loadAnnos(); }
  else {
    try { _annos = JSON.parse(localStorage.getItem("cr4-an-" + _cur.id + "-" + _ci)) || []; } catch(e) { _annos = []; }
    showReader();
    var sc = document.getElementById("rscroll");
    if (sc) sc.scrollTop = 0;
  }
}

// ── Poll ──
function startPoll() {
  stopPoll();
  if (!_cloud) return;
  _poll = setInterval(function() {
    var ch = _chs[_ci]; if (!ch) return;
    supaFetch("annotations?chapter_id=eq." + ch.id + "&order=paragraph_index.asc,created_at.asc", "GET").then(function(data) {
      if (data.length !== _annos.length) { _annos = data; refreshReader(); }
    }).catch(function(){});
  }, 10000);
}
function stopPoll() { if (_poll) { clearInterval(_poll); _poll = null; } }

// ── TOC ──
function showToc() {
  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3>☰ 目录</h3><button onclick="hideToc()" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:18px">×</button></div>';
  for (var i = 0; i < _chs.length; i++) {
    var isCur = i === _ci;
    h += '<div class="toc-i' + (isCur?' cur':'') + '" onclick="goCh('+i+');hideToc()">';
    h += '<span style="color:var(--text-muted);font-size:10px;margin-right:8px;min-width:20px">' + (i+1) + '</span>';
    h += esc(_chs[i].title);
    h += '</div>';
  }
  document.getElementById("toc").innerHTML = h;
  document.getElementById("toc").style.display = "block";
  document.getElementById("toc-bg").style.display = "block";
}
function hideToc() {
  document.getElementById("toc").style.display = "none";
  document.getElementById("toc-bg").style.display = "none";
}

window.openModal=openModal; window.closeModal=closeModal; window.onFile=onFile; window.upload=upload;
window.showShelf=showShelf; window.openBook=openBook; window.delBook=delBook;
window.backToShelf=backToShelf; window.toggleP=toggleP; window.toggleAnno=toggleAnno;
window.addAnno=addAnno; window.delAnno=delAnno; window.goCh=goCh;
window.showToc=showToc; window.hideToc=hideToc; window.onReadScroll=onReadScroll;

showShelf();

} catch(e) { document.body.innerHTML = '<pre style="color:red;padding:20px">Error: ' + e.message + '</pre>'; }
</script>
