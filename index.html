<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>共读小屋</title>
<style>
body{margin:0;padding:0;font-family:-apple-system,sans-serif;background:#FAF6F0;color:#3A3028}
#hd{padding:14px 16px;background:#FFFDF8;border-bottom:1px solid #E8DFD4;display:flex;align-items:center;justify-content:space-between}
#hd h1{font-size:18px;color:#B8860B;margin:0}
#hd small{font-size:10px;color:#8C7B6B;display:block;margin-top:2px}
#main{padding:24px 16px}
.pri{padding:10px 16px;border-radius:18px;border:none;background:#B8860B;color:#fff;font-size:14px;cursor:pointer;-webkit-appearance:none}
.btn{padding:8px 14px;border-radius:18px;border:1px solid #E8DFD4;background:#FFFDF8;color:#3A3028;font-size:13px;cursor:pointer;-webkit-appearance:none}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:99}
.box{background:#FFFDF8;border-radius:14px;padding:24px;width:88%;max-width:380px}
.box h2{font-size:18px;color:#B8860B;margin:0 0 16px}
.box label{font-size:12px;color:#8C7B6B;display:block;margin:10px 0 4px}
.box input[type=text]{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #E8DFD4;font-size:14px;background:#FAF6F0;-webkit-appearance:none}
.grid{display:flex;flex-wrap:wrap;gap:16px;margin-top:14px}
.card{width:120px;height:170px;border-radius:3px 10px 10px 3px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:14px 10px;cursor:pointer}
.card span{font-size:13px;font-weight:700;color:#fff;text-align:center;line-height:1.4;word-break:break-all}
.rhd{padding:10px 12px;background:#FFFDF8;border-bottom:1px solid #E8DFD4;display:flex;align-items:center;gap:6px}
.sm{padding:5px 10px;border-radius:16px;border:1px solid #E8DFD4;background:#FFFDF8;font-size:11px;cursor:pointer;-webkit-appearance:none}
.pa{font-size:15px;line-height:2;text-indent:2em;padding:2px 6px;margin:0 0 2px;cursor:pointer}
.pa:active{background:#F5EDE3}
#log{background:#333;color:#0f0;font-size:11px;padding:6px 10px;font-family:monospace;margin:8px 16px;border-radius:6px;white-space:pre-wrap}
</style>
</head>
<body>

<div id="log">等待加载...</div>

<div id="shelf">
  <div id="hd">
    <div>
      <h1>共读小屋</h1>
      <small>柰柰 &amp; Claude 的阅读角</small>
    </div>
    <button class="pri" onclick="openModal()">+ 新书</button>
  </div>
  <div id="main"></div>
</div>

<div id="reader" style="display:none"></div>

<div id="modal" class="overlay" style="display:none">
  <div class="box">
    <h2>添加新书</h2>
    <label>书名</label>
    <input type="text" id="inp-title">
    <label>作者（选填）</label>
    <input type="text" id="inp-author">
    <label>上传 TXT 文件</label>
    <input type="file" accept=".txt" id="inp-file" style="font-size:12px;margin-top:4px" onchange="onFile(this)">
    <div id="inp-info" style="font-size:12px;color:#8C7B6B;margin-top:6px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="pri" onclick="upload()">开始阅读</button>
    </div>
  </div>
</div>

<script>
var _log = document.getElementById("log");
function log(s) { _log.textContent += "\n" + s; }

try {
  log("JS开始执行");

  var _fileText = "";
  var _books = [];
  var _curBook = null;
  var _chapters = [];
  var _curCh = 0;

  // localStorage helpers
  function ls(k, v) {
    if (v === undefined) {
      try { var x = localStorage.getItem(k); return x ? JSON.parse(x) : null; } catch(e) { return null; }
    } else {
      try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
    }
  }

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function parseCh(raw) {
    var lines = raw.split(/\r?\n/);
    var out = [];
    var t = "前言";
    var buf = [];
    var i;
    for (i = 0; i < lines.length; i++) {
      var tr = lines[i].trim();
      if (/^第[一二三四五六七八九十百千零0-9]+[章回节卷篇]/.test(tr)) {
        if (buf.length > 0) {
          var c = buf.join("\n").trim();
          if (c.length > 100) out.push({t: t, c: c});
        }
        t = tr;
        buf = [];
      } else {
        buf.push(lines[i]);
      }
    }
    if (buf.length > 0) {
      var c2 = buf.join("\n").trim();
      if (c2.length > 100) out.push({t: t, c: c2});
    }
    if (out.length === 0) out.push({t: "全文", c: raw.trim()});
    return out;
  }

  // Modal
  function openModal() {
    log("打开上传窗口");
    document.getElementById("modal").style.display = "flex";
    _fileText = "";
  }

  function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("inp-title").value = "";
    document.getElementById("inp-author").value = "";
    document.getElementById("inp-file").value = "";
    document.getElementById("inp-info").textContent = "";
    _fileText = "";
  }

  function onFile(el) {
    var f = el.files[0];
    if (!f) return;
    log("选择文件: " + f.name);
    var r = new FileReader();
    r.onload = function(ev) {
      _fileText = ev.target.result;
      var chs = parseCh(_fileText);
      document.getElementById("inp-info").textContent = "已读取 " + _fileText.length + " 字，" + chs.length + " 个章节";
      log("解析完成: " + chs.length + "章");
    };
    r.readAsText(f, "UTF-8");
    if (!document.getElementById("inp-title").value) {
      document.getElementById("inp-title").value = f.name.replace(/\.txt$/i, "");
    }
  }

  function upload() {
    var title = document.getElementById("inp-title").value.trim();
    var author = document.getElementById("inp-author").value.trim();
    if (!title || !_fileText) { alert("请填写书名并上传文件"); return; }
    log("开始上传: " + title);
    var chs = parseCh(_fileText);
    var id = "b" + Date.now();
    var meta = {id: id, title: title, author: author || null};
    _books.push(meta);
    ls("cr2-books", _books);
    ls("cr2-ch-" + id, chs);
    closeModal();
    _curBook = meta;
    _chapters = chs;
    _curCh = 0;
    showReader();
  }

  // Shelf
  function showShelf() {
    _books = ls("cr2-books") || [];
    document.getElementById("shelf").style.display = "block";
    document.getElementById("reader").style.display = "none";
    var el = document.getElementById("main");
    if (_books.length === 0) {
      el.innerHTML = '<div style="text-align:center;padding:60px 16px"><div style="font-size:40px;margin-bottom:8px">📚</div><p style="font-size:16px;margin-bottom:4px">书架还是空的</p><p style="font-size:13px;color:#8C7B6B">上传 TXT 开始共读之旅</p></div>';
      return;
    }
    var colors = ["#8B7355","#6B7B5A","#5B6B8A","#8A5B6B","#7B6B8A"];
    var h = '<div style="font-size:13px;color:#8C7B6B">我们的书架 · ' + _books.length + ' 本</div><div class="grid">';
    var i;
    for (i = 0; i < _books.length; i++) {
      var b = _books[i];
      var co = colors[b.title.length % colors.length];
      h += '<div class="card" style="background:linear-gradient(135deg,' + co + ',' + co + 'BB)" onclick="openBook(' + i + ')">';
      h += '<span>' + esc(b.title) + '</span>';
      if (b.author) h += '<small style="font-size:10px;color:rgba(255,255,255,.7);margin-top:6px">' + esc(b.author) + '</small>';
      h += '</div>';
    }
    h += '</div>';
    el.innerHTML = h;
    log("书架加载完成: " + _books.length + "本");
  }

  function openBook(idx) {
    _curBook = _books[idx];
    _chapters = ls("cr2-ch-" + _curBook.id) || [];
    _curCh = 0;
    log("打开: " + _curBook.title + " (" + _chapters.length + "章)");
    showReader();
  }

  // Reader
  function showReader() {
    document.getElementById("shelf").style.display = "none";
    var ch = _chapters[_curCh];
    if (!ch) return;
    var paras = ch.c.split(/\n+/).filter(function(p) { return p.trim(); });
    var h = '<div class="rhd">';
    h += '<button class="sm" onclick="showShelf()">← 书架</button>';
    h += '<div style="flex:1;text-align:center"><div style="font-size:13px;color:#B8860B;font-weight:600">' + esc(_curBook.title) + '</div>';
    h += '<div style="font-size:10px;color:#8C7B6B">' + esc(ch.t) + ' · ' + (_curCh+1) + '/' + _chapters.length + '</div></div>';
    h += '</div>';
    h += '<div style="padding:20px 14px;overflow-y:auto;height:calc(100vh - 50px);-webkit-overflow-scrolling:touch">';
    h += '<h2 style="font-size:18px;font-weight:700;text-align:center;margin-bottom:24px;line-height:1.5">' + esc(ch.t) + '</h2>';
    var i;
    for (i = 0; i < paras.length; i++) {
      h += '<p class="pa">' + esc(paras[i]) + '</p>';
    }
    h += '<div style="display:flex;justify-content:space-between;padding:24px 0 40px;border-top:1px solid #E8DFD4;margin-top:24px">';
    if (_curCh > 0) h += '<button class="btn" onclick="goCh(' + (_curCh-1) + ')">← 上一章</button>';
    else h += '<button class="btn" style="opacity:.3">← 上一章</button>';
    h += '<span style="font-size:11px;color:#8C7B6B">' + (_curCh+1) + '/' + _chapters.length + '</span>';
    if (_curCh < _chapters.length-1) h += '<button class="btn" onclick="goCh(' + (_curCh+1) + ')">下一章 →</button>';
    else h += '<button class="btn" style="opacity:.3">下一章 →</button>';
    h += '</div></div>';
    document.getElementById("reader").innerHTML = h;
    document.getElementById("reader").style.display = "block";
  }

  function goCh(n) {
    _curCh = n;
    showReader();
    window.scrollTo(0, 0);
  }

  // Make functions global
  window.openModal = openModal;
  window.closeModal = closeModal;
  window.onFile = onFile;
  window.upload = upload;
  window.showShelf = showShelf;
  window.openBook = openBook;
  window.goCh = goCh;

  log("函数定义完成");
  showShelf();
  log("✓ 加载成功！");

} catch(e) {
  log("错误: " + e.message);
}
</script>

</body>
</html>
