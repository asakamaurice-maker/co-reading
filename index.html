<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>共读小屋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#FAF6F0;color:#3A3028}
.hd{padding:14px 16px;background:#FFFDF8;border-bottom:1px solid #E8DFD4;display:flex;align-items:center;justify-content:space-between}
.hd h1{font-size:18px;color:#B8860B;letter-spacing:1px}
.hd small{font-size:10px;color:#8C7B6B;display:block;margin-top:2px}
.btn{padding:8px 14px;border-radius:18px;border:1px solid #E8DFD4;background:#FFFDF8;color:#3A3028;font-size:13px}
.pri{padding:8px 14px;border-radius:18px;border:none;background:#B8860B;color:#fff;font-size:13px}
#app{padding:24px 16px}
.empty{text-align:center;padding:60px 16px}
.empty p{font-size:14px;color:#8C7B6B;margin:8px 0 16px}
.grid{display:flex;flex-wrap:wrap;gap:16px}
.card{width:120px;height:170px;border-radius:3px 10px 10px 3px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:14px 10px;position:relative;cursor:pointer}
.card span{font-size:13px;font-weight:700;color:#fff;text-align:center;line-height:1.4;word-break:break-all}
.card small{font-size:10px;color:rgba(255,255,255,.7);margin-top:6px}
.del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;border:none;background:#c0392b;color:#fff;font-size:10px;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:99}
.box{background:#FFFDF8;border-radius:14px;padding:24px;width:min(88vw,380px)}
.box h2{font-size:18px;color:#B8860B;margin-bottom:16px}
.box label{font-size:12px;color:#8C7B6B;display:block;margin:10px 0 4px}
.box input[type=text]{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #E8DFD4;font-size:14px;background:#FAF6F0}
.box input[type=text]:focus{outline:none;border-color:#B8860B}
.acts{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.rhd{padding:10px 12px;background:#FFFDF8;border-bottom:1px solid #E8DFD4;display:flex;align-items:center;gap:6px}
.rhd .ti{flex:1;text-align:center;overflow:hidden}
.rhd .ti h3{font-size:13px;color:#B8860B;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rhd .ti small{font-size:10px;color:#8C7B6B}
.sm{padding:4px 8px;border-radius:16px;border:1px solid #E8DFD4;background:#FFFDF8;color:#3A3028;font-size:10px}
.sm.on{background:#B8860B;color:#fff;border:none}
.ch-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:24px;color:#3A3028;line-height:1.5}
.pa{font-size:15px;line-height:2;text-indent:2em;padding:2px 6px;margin:0 0 2px;cursor:pointer;border-radius:4px;border-left:3px solid transparent;position:relative}
.pa:active{background:#F5EDE3}
.pa.hl{background:linear-gradient(to right,transparent,#FDF5EE);border-left-color:#B8860B}
.pa .bc{position:absolute;right:2px;top:1px;font-size:9px;color:#B8860B}
.an{padding:8px 8px 8px 12px}
.bub{padding:10px 12px;border-radius:10px;margin-bottom:6px}
.bub.me{background:#FDF5EE;border:1px solid #E8D5C4}
.bub.cl{background:#EEF4FA;border:1px solid #C4D8EC}
.bub .nm{font-size:11px;font-weight:700}
.bub .nm.n{color:#A0775A}.bub .nm.c{color:#5B7FA5}
.bub .ct{font-size:13px;line-height:1.8;margin-top:4px}
.cr{display:flex;gap:6px;margin-top:4px}
.cr textarea{flex:1;padding:8px;border-radius:8px;border:1px solid #E8DFD4;font-size:12px;resize:none;height:40px;font-family:inherit}
.cr textarea:focus{outline:none;border-color:#B8860B}
.nv{display:flex;justify-content:space-between;align-items:center;padding:24px 0 40px;border-top:1px solid #E8DFD4;margin-top:24px}
.toc{position:fixed;top:0;left:0;bottom:0;width:220px;background:#FFFDF8;z-index:50;overflow-y:auto;padding:14px;box-shadow:4px 0 16px rgba(0,0,0,.1)}
.toc-bg{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:49}
.toc h3{font-size:14px;color:#B8860B;margin-bottom:10px}
.toc div{padding:6px 8px;border-radius:6px;font-size:12px;cursor:pointer;margin-bottom:2px}
.toc div.cur{background:#F5EDE3;color:#B8860B;font-weight:600}
#debug{position:fixed;bottom:0;left:0;right:0;background:#333;color:#0f0;font-size:10px;padding:4px 8px;font-family:monospace;max-height:60px;overflow-y:auto;z-index:999;display:none}
</style>
</head>
<body>
<div id="debug"></div>

<div id="shelf">
  <div class="hd">
    <div><h1>共读小屋</h1><small>柰柰 & Claude 的阅读角</small></div>
    <button class="pri" id="add-btn">+ 新书</button>
  </div>
  <div id="app"></div>
</div>

<div id="reader" style="display:none">
  <div class="rhd">
    <button class="sm" id="back-btn">← 书架</button>
    <div class="ti"><h3 id="rt"></h3><small id="rs"></small></div>
    <button class="sm on" id="abtn">批注</button>
    <button class="sm" id="tbtn">目录</button>
  </div>
  <div id="rc" style="overflow-y:auto;padding:20px 14px;-webkit-overflow-scrolling:touch"></div>
</div>

<div id="toc-bg" class="toc-bg" style="display:none"></div>
<div id="toc" class="toc" style="display:none"></div>

<div id="modal" class="overlay" style="display:none">
  <div class="box">
    <h2>添加新书</h2>
    <label>书名</label>
    <input type="text" id="m-title">
    <label>作者（选填）</label>
    <input type="text" id="m-author">
    <label>上传 TXT 文件</label>
    <input type="file" accept=".txt" id="m-file" style="font-size:12px;margin-top:4px">
    <div id="m-info" style="font-size:12px;color:#8C7B6B;margin-top:6px"></div>
    <div class="acts">
      <button class="btn" id="m-cancel">取消</button>
      <button class="pri" id="m-go">开始阅读</button>
    </div>
  </div>
</div>

<script>
// Debug helper
function log(msg){
  console.log(msg);
  var d=document.getElementById("debug");
  d.style.display="block";
  d.textContent=msg;
  setTimeout(function(){d.style.display="none";},5000);
}

// Storage
function sGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function sDel(k){try{localStorage.removeItem(k);}catch(e){}}

// Escape HTML
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}

// Parse chapters
function parse(raw){
  var lines=raw.split(/\r?\n/);
  var re=/^第[一二三四五六七八九十百千零\d]+[章回节卷篇][\s\u3000]/;
  var out=[];
  var t="前言";
  var buf=[];
  for(var i=0;i<lines.length;i++){
    var tr=lines[i].trim();
    if(re.test(tr+' ')){
      if(buf.length>0){
        var c=buf.join("\n").trim();
        if(c.length>100){out.push({t:t,c:c});}
      }
      t=tr;
      buf=[];
    }else{
      buf.push(lines[i]);
    }
  }
  if(buf.length>0){
    var c=buf.join("\n").trim();
    if(c.length>100){out.push({t:t,c:c});}
  }
  if(out.length===0){out.push({t:"全文",c:raw.trim()});}
  return out;
}

// State
var books=[];
var curBook=null;
var chapters=[];
var curCh=0;
var annos={};
var showA=true;
var openP=-1;
var fileText="";

// Shelf
function loadShelf(){
  books=sGet("books")||[];
  renderShelf();
}

function renderShelf(){
  var el=document.getElementById("app");
  if(books.length===0){
    el.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:8px">📚</div><h3>书架还是空的</h3><p>上传 TXT 开始共读之旅</p></div>';
    return;
  }
  var cs=["#8B7355","#6B7B5A","#5B6B8A","#8A5B6B","#7B6B8A"];
  var h='<div style="font-size:13px;color:#8C7B6B;margin-bottom:14px">我们的书架 · '+books.length+' 本</div><div class="grid">';
  for(var i=0;i<books.length;i++){
    var b=books[i];
    var co=cs[b.title.length%cs.length];
    h+='<div style="position:relative"><div class="card" style="background:linear-gradient(135deg,'+co+','+co+'BB)" data-idx="'+i+'">';
    h+='<span>'+esc(b.title)+'</span>';
    if(b.author){h+='<small>'+esc(b.author)+'</small>';}
    h+='</div><button class="del" data-del="'+i+'">×</button></div>';
  }
  h+='</div>';
  el.innerHTML=h;

  // Bind events
  var cards=el.querySelectorAll(".card");
  for(var i=0;i<cards.length;i++){
    cards[i].addEventListener("click",function(){
      var idx=parseInt(this.getAttribute("data-idx"));
      openBook(idx);
    });
  }
  var dels=el.querySelectorAll(".del");
  for(var i=0;i<dels.length;i++){
    dels[i].addEventListener("click",function(e){
      e.stopPropagation();
      var idx=parseInt(this.getAttribute("data-del"));
      if(confirm("确定删除？")){
        sDel("ch-"+books[idx].id);
        sDel("an-"+books[idx].id);
        books.splice(idx,1);
        sSet("books",books);
        renderShelf();
      }
    });
  }
}

function openBook(idx){
  curBook=books[idx];
  chapters=sGet("ch-"+curBook.id)||[];
  annos=sGet("an-"+curBook.id)||{};
  curCh=0;
  openP=-1;
  document.getElementById("shelf").style.display="none";
  document.getElementById("reader").style.display="block";
  var rc=document.getElementById("rc");
  rc.style.height=(window.innerHeight-46)+"px";
  renderReader();
}

function backToShelf(){
  document.getElementById("reader").style.display="none";
  document.getElementById("shelf").style.display="block";
  loadShelf();
}

// Reader
function renderReader(){
  var ch=chapters[curCh];
  if(!ch)return;
  document.getElementById("rt").textContent=curBook.title;
  document.getElementById("rs").textContent=ch.t+" · "+(curCh+1)+"/"+chapters.length;

  var paras=ch.c.split(/\n+/).filter(function(p){return p.trim();});
  var key="c"+curCh;
  var ca=annos[key]||[];

  var h='<h2 class="ch-title">'+esc(ch.t)+'</h2>';
  for(var i=0;i<paras.length;i++){
    var pa=ca.filter(function(a){return a.pi===i;});
    var hasPa=pa.length>0;
    h+='<p class="pa'+(hasPa?' hl':'')+'" data-pi="'+i+'">'+esc(paras[i]);
    if(hasPa){h+='<span class="bc">'+pa.length+'条</span>';}
    h+='</p>';
    h+='<div class="an" data-an="'+i+'" style="display:none">';
    for(var j=0;j<pa.length;j++){
      var a=pa[j];
      var ic=a.w==="claude";
      h+='<div class="bub '+(ic?'cl':'me')+'">';
      h+='<span class="nm '+(ic?'c':'n')+'">'+(ic?'Claude':'柰柰')+'</span>';
      h+='<div class="ct">'+esc(a.tx)+'</div></div>';
    }
    h+='<div class="cr"><textarea data-ta="'+i+'" placeholder="写下你的想法..."></textarea>';

```
h+='<button class="pri" data-send="'+i+'" style="padding:6px 10px;font-size:11px;height:32px;align-self:flex-end">发送</button></div>';
h+='</div>';
```

}
h+=’<div class="nv">’;
h+=’<button class="btn" data-go="'+(curCh-1)+'" style="font-size:12px;opacity:'+(curCh<=0?'.3':'1')+'">← 上一章</button>’;
h+=’<span style="font-size:11px;color:#8C7B6B">’+(curCh+1)+’/’+chapters.length+’</span>’;
h+=’<button class="btn" data-go="'+(curCh+1)+'" style="font-size:12px;opacity:'+(curCh>=chapters.length-1?'.3':'1')+'">下一章 →</button>’;
h+=’</div>’;

var rc=document.getElementById(“rc”);
rc.innerHTML=h;
rc.scrollTop=0;

// Bind paragraph clicks
var ps=rc.querySelectorAll(”.pa”);
for(var i=0;i<ps.length;i++){
ps[i].addEventListener(“click”,function(){
if(!showA)return;
var pi=parseInt(this.getAttribute(“data-pi”));
toggleP(pi);
});
}
// Bind send buttons
var sends=rc.querySelectorAll(”[data-send]”);
for(var i=0;i<sends.length;i++){
sends[i].addEventListener(“click”,function(){
var pi=parseInt(this.getAttribute(“data-send”));
var ta=rc.querySelector(’[data-ta=”’+pi+’”]’);
if(!ta||!ta.value.trim())return;
var key=“c”+curCh;
if(!annos[key])annos[key]=[];
var ch2=chapters[curCh];
var paras2=ch2.c.split(/\n+/).filter(function(p){return p.trim();});
annos[key].push({w:“nainai”,tx:ta.value.trim(),pi:pi,at:new Date().toISOString()});
sSet(“an-”+curBook.id,annos);
renderReader();
});
}
// Bind nav
var navs=rc.querySelectorAll(”[data-go]”);
for(var i=0;i<navs.length;i++){
navs[i].addEventListener(“click”,function(){
var n=parseInt(this.getAttribute(“data-go”));
if(n>=0&&n<chapters.length){curCh=n;openP=-1;renderReader();}
});
}
}

function toggleP(pi){
// Close old
if(openP>=0){
var old=document.querySelector(’[data-an=”’+openP+’”]’);
if(old)old.style.display=“none”;
var op=document.querySelector(’[data-pi=”’+openP+’”]’);
if(op)op.style.background=””;
}
if(openP===pi){openP=-1;return;}
openP=pi;
var el=document.querySelector(’[data-an=”’+pi+’”]’);
if(el)el.style.display=“block”;
var pe=document.querySelector(’[data-pi=”’+pi+’”]’);
if(pe)pe.style.background=”#F5EDE3”;
}

// Upload
function showModal(){
document.getElementById(“modal”).style.display=“flex”;
fileText=””;
}
function hideModal(){
document.getElementById(“modal”).style.display=“none”;
document.getElementById(“m-title”).value=””;
document.getElementById(“m-author”).value=””;
document.getElementById(“m-file”).value=””;
document.getElementById(“m-info”).textContent=””;
fileText=””;
}
function doUpload(){
var title=document.getElementById(“m-title”).value.trim();
var author=document.getElementById(“m-author”).value.trim();
if(!title||!fileText){alert(“请填写书名并上传文件”);return;}
var chs=parse(fileText);
var id=“b”+Date.now();
var meta={id:id,title:title,author:author||null};
books.push(meta);
sSet(“books”,books);
var chData=chs.map(function(c,i){return{t:c.t,c:c.c};});
sSet(“ch-”+id,chData);
hideModal();
curBook=meta;
chapters=chData;
annos={};
curCh=0;
openP=-1;
document.getElementById(“shelf”).style.display=“none”;
document.getElementById(“reader”).style.display=“block”;
var rc=document.getElementById(“rc”);
rc.style.height=(window.innerHeight-46)+“px”;
renderReader();
}

// TOC
function showToc(){
var h=’<h3>目录</h3>’;
for(var i=0;i<chapters.length;i++){
h+=’<div class="'+(i===curCh?'cur':'')+'" data-toc="'+i+'">’+esc(chapters[i].t)+’</div>’;
}
document.getElementById(“toc”).innerHTML=h;
document.getElementById(“toc”).style.display=“block”;
document.getElementById(“toc-bg”).style.display=“block”;
var items=document.getElementById(“toc”).querySelectorAll(”[data-toc]”);
for(var i=0;i<items.length;i++){
items[i].addEventListener(“click”,function(){
curCh=parseInt(this.getAttribute(“data-toc”));
openP=-1;
hideToc();
renderReader();
});
}
}
function hideToc(){
document.getElementById(“toc”).style.display=“none”;
document.getElementById(“toc-bg”).style.display=“none”;
}

// Event bindings
document.getElementById(“add-btn”).addEventListener(“click”,showModal);
document.getElementById(“m-cancel”).addEventListener(“click”,hideModal);
document.getElementById(“m-go”).addEventListener(“click”,doUpload);
document.getElementById(“back-btn”).addEventListener(“click”,backToShelf);
document.getElementById(“tbtn”).addEventListener(“click”,showToc);
document.getElementById(“toc-bg”).addEventListener(“click”,hideToc);
document.getElementById(“abtn”).addEventListener(“click”,function(){
showA=!showA;
this.className=showA?“sm on”:“sm”;
openP=-1;
renderReader();
});
document.getElementById(“m-file”).addEventListener(“change”,function(e){
var f=e.target.files[0];
if(!f)return;
var r=new FileReader();
r.onload=function(ev){
fileText=ev.target.result;
var chs=parse(fileText);
document.getElementById(“m-info”).textContent=“已读取 “+fileText.length+” 字，”+chs.length+” 个有效章节”;
};
r.readAsText(f,“UTF-8”);
if(!document.getElementById(“m-title”).value){
document.getElementById(“m-title”).value=f.name.replace(/.txt$/i,””);
}
});

// Init
log(“共读小屋加载中…”);
loadShelf();
log(“加载完成！”);
</script>

</body>
</html>
