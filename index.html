<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="共读小屋">
<title>共读小屋 · 柰柰 & Claude</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=LXGW+WenKai:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'LXGW WenKai',serif;background:#FAF6F0;color:#3A3028;overflow-x:hidden;min-height:100vh;min-height:100dvh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#E8DFD4;border-radius:2px}
input,textarea{font-family:'LXGW WenKai',serif;outline:none}
input:focus,textarea:focus{border-color:#B8860B!important}
.btn{padding:8px 16px;border-radius:20px;border:1px solid #E8DFD4;background:#FFFDF8;color:#3A3028;cursor:pointer;font-family:'LXGW WenKai',serif;font-size:13px}
.btn-p{padding:8px 16px;border-radius:20px;border:none;background:#B8860B;color:#fff;cursor:pointer;font-family:'LXGW WenKai',serif;font-size:13px}
.btn-s{padding:4px 8px;border-radius:20px;border:1px solid #E8DFD4;background:#FFFDF8;color:#3A3028;cursor:pointer;font-family:'LXGW WenKai',serif;font-size:10px}
.header{padding:16px;border-bottom:1px solid #E8DFD4;background:#FFFDF8;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 6px rgba(139,115,85,0.08)}
.page{display:none}.page.active{display:block}
.book-grid{display:flex;flex-wrap:wrap;gap:18px}
.book-card{width:125px;height:180px;border-radius:3px 10px 10px 3px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:16px 12px;position:relative;overflow:hidden;cursor:pointer;box-shadow:3px 3px 12px rgba(139,115,85,0.08)}
.book-card .spine{position:absolute;left:0;top:0;bottom:0;width:5px;background:rgba(0,0,0,0.15)}
.book-card .title{font-family:'Noto Serif SC',serif;font-size:14px;font-weight:700;color:#fff;text-align:center;line-height:1.5;text-shadow:0 1px 2px rgba(0,0,0,0.3);word-break:break-all}
.book-card .author{font-size:11px;color:rgba(255,255,255,0.7);margin-top:8px}
.book-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:none;background:#c0392b;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#FFFDF8;border-radius:16px;padding:26px;width:min(88vw,400px);box-shadow:0 16px 48px rgba(0,0,0,0.15)}
.modal h2{font-family:'Noto Serif SC',serif;font-size:19px;margin-bottom:18px;color:#B8860B}
.modal label{font-size:12px;color:#8C7B6B;display:block;margin-bottom:4px}
.modal input[type=text]{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #E8DFD4;font-size:14px;background:#FAF6F0;box-sizing:border-box}
.reader-header{padding:10px 12px;background:#FFFDF8;border-bottom:1px solid #E8DFD4;display:flex;align-items:center;gap:6px}
.reader-title{flex:1;text-align:center;min-width:0}
.reader-title h3{font-family:'Noto Serif SC',serif;font-size:13px;font-weight:600;color:#B8860B;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reader-title small{font-size:10px;color:#8C7B6B}
.chapter-title{font-family:'Noto Serif SC',serif;font-size:19px;font-weight:700;text-align:center;margin-bottom:28px;color:#3A3028;letter-spacing:1.5px;line-height:1.5}
.para{font-family:'Noto Serif SC',serif;font-size:15px;line-height:2;text-indent:2em;color:#3A3028;cursor:pointer;padding:2px 6px;border-radius:4px;margin:0 0 2px;position:relative;border-left:3px solid transparent}
.para.has-anno{background:linear-gradient(to right,transparent,#FDF5EE);border-left-color:#B8860B}
.para.selected{background:#F5EDE3}
.para .badge{position:absolute;right:2px;top:1px;font-size:9px;color:#B8860B;font-family:'LXGW WenKai',serif}
.anno-box{padding:8px 8px 8px 12px}
.bubble{padding:10px 12px;border-radius:10px;margin-bottom:6px}
.bubble.nainai{background:#FDF5EE;border:1px solid #E8D5C4}
.bubble.claude{background:#EEF4FA;border:1px solid #C4D8EC}
.bubble .who{font-size:11px;font-weight:700}
.bubble .who.n{color:#A0775A}.bubble .who.c{color:#5B7FA5}
.bubble .time{font-size:10px;color:#8C7B6B}
.bubble .hl{font-size:11px;color:#8C7B6B;font-style:italic;padding-left:8px;margin-bottom:6px;line-height:1.5}
.bubble .hl.n{border-left:2px solid #A0775A}.bubble .hl.c{border-left:2px solid #5B7FA5}
.bubble .txt{font-size:13px;line-height:1.8;color:#3A3028}
.toc-overlay{position:absolute;inset:0;z-index:10;display:flex}
.toc-panel{width:220px;background:#FFFDF8;overflow-y:auto;box-shadow:4px 0 16px rgba(0,0,0,0.1);padding:14px}
.toc-item{padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;margin-bottom:2px;line-height:1.4}
.toc-item.active{background:#F5EDE3;color:#B8860B;font-weight:600}
.nav-bar{display:flex;justify-content:space-between;align-items:center;padding:28px 0 44px;border-top:1px solid #E8DFD4;margin-top:28px}
.empty{text-align:center;padding:60px 14px}
.empty .icon{font-size:44px;margin-bottom:12px}
.empty h3{font-family:'Noto Serif SC',serif;font-size:17px;margin-bottom:6px}
.empty p{font-size:13px;color:#8C7B6B;margin-bottom:18px}
.comment-row{display:flex;gap:6px;margin-top:4px}
.comment-row textarea{flex:1;padding:8px 10px;border-radius:10px;border:1px solid #E8DFD4;font-size:12px;resize:none;height:44px;background:#FFFDF8;line-height:1.5}
</style>
</head>
<body>

<!-- Shelf Page -->

<div id="shelf-page" class="page active">
  <div class="header">
    <div>
      <div style="font-family:'Noto Serif SC',serif;font-size:19px;font-weight:700;color:#B8860B;letter-spacing:2px">共读小屋</div>
      <div style="font-size:10px;color:#8C7B6B;margin-top:1px" id="shelf-sub">柰柰 & Claude 的阅读角</div>
    </div>
    <button class="btn-p" onclick="showUpload()">+ 新书</button>
  </div>
  <div style="padding:28px 16px" id="shelf-content"></div>
</div>

<!-- Reader Page -->

<div id="reader-page" class="page">
  <div class="reader-header">
    <button class="btn-s" onclick="backToShelf()">← 书架</button>
    <div class="reader-title"><h3 id="r-title"></h3><small id="r-sub"></small></div>
    <button class="btn-s" id="anno-btn" onclick="toggleAnno()">批注</button>
    <button class="btn-s" onclick="toggleToc()">目录</button>
  </div>
  <div style="flex:1;overflow:hidden;position:relative;height:calc(100vh - 50px);height:calc(100dvh - 50px)" id="reader-wrap">
    <div id="toc-overlay" class="toc-overlay" style="display:none">
      <div class="toc-panel" id="toc-list"></div>
      <div style="flex:1;background:rgba(0,0,0,0.2)" onclick="toggleToc()"></div>
    </div>
    <div id="reader-scroll" style="height:100%;overflow-y:auto;padding:24px 14px;display:flex;justify-content:center;-webkit-overflow-scrolling:touch">
      <div style="max-width:600px;width:100%" id="reader-content"></div>
    </div>
  </div>
</div>

<!-- Upload Modal -->

<div id="upload-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h2>添加新书</h2>
    <div style="margin-bottom:12px"><label>书名</label><input type="text" id="up-title"></div>
    <div style="margin-bottom:12px"><label>作者</label><input type="text" id="up-author" placeholder="选填"></div>
    <div style="margin-bottom:18px">
      <label>上传 TXT</label>
      <input type="file" accept=".txt" id="up-file" style="font-size:12px;font-family:'LXGW WenKai',serif">
      <div id="up-info" style="margin-top:6px;font-size:12px;color:#8C7B6B"></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn" onclick="hideUpload()">取消</button>
      <button class="btn-p" id="up-go" onclick="doUpload()">开始阅读</button>
    </div>
  </div>
</div>

<script>
// ── Supabase ──
const SUPA="https://vkomsdwasoviccjqhisz.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrb21zZHdhc292aWNjanFoaXN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDYwNzAsImV4cCI6MjA4ODY4MjA3MH0.hsk23LotAH3-C7j4ytcT6ABqMVfniC_byxAcGwfDKp8";
const H={"Content-Type":"application/json",apikey:KEY,Authorization:"Bearer "+KEY,Prefer:"return=representation"};

async function supa(path,opt){
  opt=opt||{};
  var r=await fetch(SUPA+"/rest/v1/"+path,Object.assign({},opt,{headers:Object.assign({},H,opt.headers||{})}));
  if(!r.ok)throw new Error(await r.text());
  var t=await r.text();return t?JSON.parse(t):[];
}

// ── State ──
var books=[], curBook=null, chapters=[], curCh=1, annos=[], showAnnotations=true, fileText="", pollTimer=null;

// ── Parse ──
function parseChapters(raw){
  var lines=raw.split(/\r?\n/), re=/^(第[一二三四五六七八九十百千零\d]+[章回节卷篇])(\s|$|[\u3000])/;
  var out=[],t="前言",buf=[];
  for(var i=0;i<lines.length;i++){
    var trimmed=lines[i].trim();
    if(re.test(trimmed)){if(buf.length){var c=buf.join("\n").trim();if(c.length>100)out.push({t:t,c:c});}t=trimmed;buf=[];}
    else buf.push(lines[i]);
  }
  if(buf.length){var c=buf.join("\n").trim();if(c.length>100)out.push({t:t,c:c});}
  if(out.length>1&&out[0].t==="前言"&&out[0].c.length>5000)out[0].t="导读";
  return out.length?out:[{t:"全文",c:raw.trim()}];
}

// ── Shelf ──
async function loadShelf(){
  var el=document.getElementById("shelf-content");
  el.innerHTML='<div style="text-align:center;color:#8C7B6B;padding:60px 0">正在整理书架...</div>';
  try{
    books=await supa("books?order=created_at.desc");
    document.getElementById("shelf-sub").textContent="柰柰 & Claude 的阅读角";
  }catch(e){
    books=[];
    document.getElementById("shelf-sub").textContent="柰柰 & Claude 的阅读角 · 连接中...";
  }
  renderShelf();
}

function renderShelf(){
  var el=document.getElementById("shelf-content");
  if(!books.length){
    el.innerHTML='<div class="empty"><div class="icon">📚</div><h3>书架还是空的</h3><p>上传 TXT 开始共读之旅</p><button class="btn-p" onclick="showUpload()">上传第一本书</button></div>';
    return;
  }
  var html='<div style="font-size:14px;color:#8C7B6B;margin-bottom:18px">我们的书架 · '+books.length+' 本</div><div class="book-grid">';
  var colors=["#8B7355","#6B7B5A","#5B6B8A","#8A5B6B","#7B6B8A"];
  for(var i=0;i<books.length;i++){
    var b=books[i], co=colors[b.title.length%colors.length];
    html+='<div style="position:relative"><div class="book-card" style="background:linear-gradient(135deg,'+co+','+co+'BB)" onclick="openBook(\''+b.id+'\')">';
    html+='<div class="spine"></div><div class="title">'+esc(b.title)+'</div>';
    if(b.author)html+='<div class="author">'+esc(b.author)+'</div>';
    html+='</div><button class="book-del" onclick="event.stopPropagation();delBook(\''+b.id+'\')">×</button></div>';
  }
  html+='</div>';
  el.innerHTML=html;
}

async function openBook(id){
  var b=books.find(function(x){return x.id===id;});
  if(!b)return;
  curBook=b;
  try{chapters=await supa("chapters?book_id=eq."+id+"&order=chapter_number.asc");}catch(e){chapters=[];alert("加载失败");}
  if(!chapters.length)return;
  curCh=1; showReader();
}

async function delBook(id){
  if(!confirm("确定删除？"))return;
  try{await supa("books?id=eq."+id,{method:"DELETE"});}catch(e){}
  loadShelf();
}

// ── Upload ──
function showUpload(){document.getElementById("upload-modal").style.display="flex";fileText="";}
function hideUpload(){document.getElementById("upload-modal").style.display="none";
  document.getElementById("up-title").value="";document.getElementById("up-author").value="";
  document.getElementById("up-file").value="";document.getElementById("up-info").textContent="";fileText="";}

document.getElementById("up-file").addEventListener("change",function(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){fileText=ev.target.result;
    var chs=parseChapters(fileText);
    document.getElementById("up-info").textContent="已读取 "+fileText.length+" 字，"+chs.length+" 个有效章节";
  };
  r.readAsText(f,"UTF-8");
  if(!document.getElementById("up-title").value)document.getElementById("up-title").value=f.name.replace(/\.txt$/i,"");
});

async function doUpload(){
  var title=document.getElementById("up-title").value.trim();
  var author=document.getElementById("up-author").value.trim();
  if(!title||!fileText){alert("请填写书名并上传文件");return;}
  var btn=document.getElementById("up-go");btn.disabled=true;btn.textContent="解析中...";
  try{
    var chs=parseChapters(fileText);
    btn.textContent="保存书籍...";
    var res=await supa("books",{method:"POST",body:JSON.stringify({title:title,author:author||null})});
    var book=res[0];
    for(var i=0;i<chs.length;i+=20){
      btn.textContent="上传章节 "+Math.min(i+20,chs.length)+"/"+chs.length;
      var batch=[];
      for(var j=i;j<Math.min(i+20,chs.length);j++){
        batch.push({book_id:book.id,chapter_number:j+1,title:chs[j].t,content:chs[j].c});
      }
      await supa("chapters",{method:"POST",body:JSON.stringify(batch)});
    }
    hideUpload();
    curBook=book;
    chapters=await supa("chapters?book_id=eq."+book.id+"&order=chapter_number.asc");
    curCh=1;
    books.unshift(book);
    showReader();
  }catch(e){alert("上传失败: "+e.message);}
  btn.disabled=false;btn.textContent="开始阅读";
}

// ── Reader ──
function showReader(){
  document.getElementById("shelf-page").classList.remove("active");
  document.getElementById("reader-page").classList.add("active");
  document.getElementById("reader-page").style.display="flex";
  document.getElementById("reader-page").style.flexDirection="column";
  document.getElementById("reader-page").style.height="100vh";
  loadChapter();
  startPoll();
}

function backToShelf(){
  stopPoll();
  document.getElementById("reader-page").classList.remove("active");
  document.getElementById("reader-page").style.display="none";
  document.getElementById("shelf-page").classList.add("active");
  loadShelf();
}

async function loadChapter(){
  var ch=chapters[curCh-1];if(!ch)return;
  document.getElementById("r-title").textContent=curBook.title;
  document.getElementById("r-sub").textContent=ch.title+" · "+curCh+"/"+chapters.length;
  document.getElementById("anno-btn").style.background=showAnnotations?"#B8860B":"#FFFDF8";
  document.getElementById("anno-btn").style.color=showAnnotations?"#fff":"#3A3028";
  document.getElementById("anno-btn").style.border=showAnnotations?"none":"1px solid #E8DFD4";
  try{annos=await supa("annotations?chapter_id=eq."+ch.id+"&order=paragraph_index.asc,created_at.asc");}catch(e){annos=[];}
  renderChapter();
}

function renderChapter(){
  var ch=chapters[curCh-1];if(!ch)return;
  var paras=ch.content.split(/\n+/).filter(function(p){return p.trim();});
  var html='<h2 class="chapter-title">'+esc(ch.title)+'</h2>';
  for(var i=0;i<paras.length;i++){
    var pa=annos.filter(function(a){return a.paragraph_index===i;});
    var cls="para"+(pa.length?" has-anno":"");
    html+='<p class="'+cls+'" onclick="togglePara('+i+')" id="para-'+i+'">'+esc(paras[i]);
    if(pa.length)html+='<span class="badge">'+pa.length+'条</span>';
    html+='</p>';
    html+='<div class="anno-box" id="anno-'+i+'" style="display:none">';
    for(var j=0;j<pa.length;j++){
      var a=pa[j],ic=a.author==="claude";
      html+='<div class="bubble '+(ic?"claude":"nainai")+'">';
      html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
      html+='<span class="who '+(ic?"c":"n")+'">'+(ic?"Claude":"柰柰")+'</span>';
      html+='<span class="time">'+new Date(a.created_at).toLocaleString("zh-CN",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})+'</span>';
      html+='<button onclick="event.stopPropagation();delAnno(\''+a.id+'\')" style="margin-left:auto;background:none;border:none;color:#8C7B6B;cursor:pointer;font-size:10px">删除</button></div>';
      if(a.highlighted_text)html+='<div class="hl '+(ic?"c":"n")+'">"'+esc(a.highlighted_text.slice(0,50))+(a.highlighted_text.length>50?"...":"")+'"</div>';
      html+='<div class="txt">'+esc(a.content)+'</div></div>';
    }
    html+='<div class="comment-row"><textarea id="cmt-'+i+'" placeholder="写下你的想法..."></textarea>';

```
html+='<button class="btn-p" style="padding:6px 10px;font-size:11px;height:32px;align-self:flex-end" onclick="addComment('+i+')">发送</button></div></div>';
```

}
html+=’<div class="nav-bar">’;
html+=’<button class="btn" style="padding:5px 12px;font-size:12px;opacity:'+(curCh<=1?'0.3':'1')+'" onclick="goCh('+(curCh-1)+')">← 上一章</button>’;
html+=’<span style="font-size:11px;color:#8C7B6B">’+curCh+’/’+chapters.length+’</span>’;
html+=’<button class="btn" style="padding:5px 12px;font-size:12px;opacity:'+(curCh>=chapters.length?'0.3':'1')+'" onclick="goCh('+(curCh+1)+')">下一章 →</button>’;
html+=’</div>’;
document.getElementById(“reader-content”).innerHTML=html;
document.getElementById(“reader-scroll”).scrollTop=0;
}

var openPara=-1;
function togglePara(i){
if(!showAnnotations)return;
if(openPara>=0){var old=document.getElementById(“anno-”+openPara);if(old)old.style.display=“none”;
var op=document.getElementById(“para-”+openPara);if(op)op.classList.remove(“selected”);}
if(openPara===i){openPara=-1;return;}
openPara=i;
var el=document.getElementById(“anno-”+i);if(el)el.style.display=“block”;
var pe=document.getElementById(“para-”+i);if(pe)pe.classList.add(“selected”);
}

function toggleAnno(){showAnnotations=!showAnnotations;openPara=-1;renderChapter();
document.getElementById(“anno-btn”).style.background=showAnnotations?”#B8860B”:”#FFFDF8”;
document.getElementById(“anno-btn”).style.color=showAnnotations?”#fff”:”#3A3028”;
document.getElementById(“anno-btn”).style.border=showAnnotations?“none”:“1px solid #E8DFD4”;}

function toggleToc(){
var el=document.getElementById(“toc-overlay”);
if(el.style.display===“none”){
var html=’<div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-family:\'Noto Serif SC\',serif;font-size:14px;font-weight:600;color:#B8860B">目录</span><button onclick="toggleToc()" style="background:none;border:none;cursor:pointer;color:#8C7B6B;font-size:16px">×</button></div>’;
for(var i=0;i<chapters.length;i++){
html+=’<div class=“toc-item’+(i+1===curCh?” active”:””)+’” onclick=“goCh(’+(i+1)+’);toggleToc()”>’+esc(chapters[i].title)+’</div>’;
}
document.getElementById(“toc-list”).innerHTML=html;
el.style.display=“flex”;
}else el.style.display=“none”;
}

function goCh(n){if(n<1||n>chapters.length)return;curCh=n;openPara=-1;loadChapter();}

async function addComment(idx){
var ta=document.getElementById(“cmt-”+idx);if(!ta||!ta.value.trim())return;
var ch=chapters[curCh-1];
var paras=ch.content.split(/\n+/).filter(function(p){return p.trim();});
try{
await supa(“annotations”,{method:“POST”,body:JSON.stringify({
chapter_id:ch.id,author:“nainai”,content:ta.value.trim(),
highlighted_text:(paras[idx]||””).slice(0,80),paragraph_index:idx
})});
ta.value=””;loadChapter();
}catch(e){alert(“评论失败: “+e.message);}
}

async function delAnno(id){
try{await supa(“annotations?id=eq.”+id,{method:“DELETE”});loadChapter();}catch(e){alert(“删除失败”);}
}

// ── Poll for Claude’s comments ──
function startPoll(){stopPoll();pollTimer=setInterval(function(){
var ch=chapters[curCh-1];if(!ch)return;
supa(“annotations?chapter_id=eq.”+ch.id+”&order=paragraph_index.asc,created_at.asc”)
.then(function(a){if(a.length!==annos.length){annos=a;renderChapter();}}).catch(function(){});
},10000);}
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}

// ── Util ──
function esc(s){var d=document.createElement(“div”);d.textContent=s;return d.innerHTML;}

// ── Init ──
loadShelf();
</script>

</body>
</html>
