async function supa(path, opt={}) {

// ── Parse chapters ──
function parseChapters(raw) {
const lines = raw.split(/\r?\n/);
const re = /^(第[一二三四五六七八九十百千零\d]+[章回节卷篇])(\s|$|[\u3000])/;
const out=[]; let t=“前言”, buf=[];
for(const line of lines) {
const trimmed = line.trim();
if(re.test(trimmed)) {
if(buf.length) { const c=buf.join(”\n”).trim(); if(c.length>100) out.push({t,c}); }
t=trimmed; buf=[];
} else buf.push(line);
}
if(buf.length) { const c=buf.join(”\n”).trim(); if(c.length>100) out.push({t,c}); }
if(out.length>1 && out[0].t===“前言” && out[0].c.length>5000) out[0].t=“导读”;
return out.length ? out : [{t:“全文”, c:raw.trim()}];
}

function Reader({book,chapters,onBack}) {
const [cur,setCur]=useState(1);
const [annos,setAnnos]=useState([]);
const [showA,setShowA]=useState(true);
const [sel,setSel]=useState(null);
const [input,setInput]=useState(””);

const ref=useRef();

const ch = chapters[cur-1];
const paras = ch ? ch.content.split(/\n+/).filter(p=>p.trim()) : [];

// Load annotations for current chapter
useEffect(()=>{
if(!ch) return;
if(book.local) {
const a = lsGet(`cr-anno-${book.id}-${cur}`)||[];
setAnnos(a);
} else {
supa(`annotations?chapter_id=eq.${ch.id}&order=paragraph_index.asc,created_at.asc`)
.then(setAnnos).catch(()=>setAnnos([]));
}
},[ch?.id, cur]);

const addComment = async(idx)=>{
if(!input.trim()||!ch) return;
const anno = {
chapter_id:ch.id, author:“nainai”, content:input.trim(),
highlighted_text:paras[idx]?.slice(0,80)||””, paragraph_index:idx,
created_at:new Date().toISOString()
};
if(book.local) {
const id = “a”+Date.now();
const newAnno = {…anno, id};
const arr = lsGet(`cr-anno-${book.id}-${cur}`)||[];
arr.push(newAnno);
lsSet(`cr-anno-${book.id}-${cur}`, arr);
setAnnos(arr);
} else {
try {
const [newA] = await supa(“annotations”,{method:“POST”,body:JSON.stringify(anno)});
setAnnos(prev=>[…prev, newA]);
} catch(e) { alert(“评论失败: “+e.message); }
}
setInput(””); setSel(null);
};

const delAnno = async(aid)=>{
if(book.local) {
const arr = (lsGet(`cr-anno-${book.id}-${cur}`)||[]).filter(a=>a.id!==aid);
lsSet(`cr-anno-${book.id}-${cur}`, arr);
setAnnos(arr);
} else {
try { await supa(`annotations?id=eq.${aid}`,{method:“DELETE”}); setAnnos(prev=>prev.filter(a=>a.id!==aid)); }
catch(e) { alert(“删除失败”); }
}
};

const go=n=>{if(n>=1&&n<=chapters.length){setCur(n);setSel(null);if(ref.current)ref.current.scrollTop=0;}};

// Poll for new annotations every 10 seconds (for Claude’s comments)
useEffect(()=>{
if(book.local||!ch) return;
const timer = setInterval(()=>{
supa(`annotations?chapter_id=eq.${ch.id}&order=paragraph_index.asc,created_at.asc`)
.then(setAnnos).catch(()=>{});
}, 10000);
return ()=>clearInterval(timer);
},[ch?.id, book.local]);

return (

(async()=>{

setBooks(data.map(b=>({…b,local:false})));
setMode(“cloud”);
} catch(e) {
console.warn(“Supabase unavailable, using local:”, e);

setBooks(local.map(b=>({…b,local:true})));
setMode(“local”);
}
setLoading(false);
})();
},[]);

const chs = lsGet(`cr-ch-${book.id}`)||[];

} else {
try {
const chs = await supa(`chapters?book_id=eq.${book.id}&order=chapter_number.asc`);
if(chs.length) setActive({book,chapters:chs});
} catch(e) { alert(“加载失败”); }
}
};

const delBook = async(book)=>{
if(book.local) {
const nb = books.filter(b=>b.id!==book.id);

try {
await supa(`books?id=eq.${book.id}`,{method:“DELETE”});
setBooks(prev=>prev.filter(b=>b.id!==book.id));
} catch(e) { alert(“删除失败”); }
}
};

    ):(<div>
      <div style={{fontSize:"14px",color:P.dim,marginBottom:"18px"}}>我们的书架 · {books.length} 本</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"18px"}}>
        {books.map(b=><Card key={b.id} book={b} onClick={()=>openBook(b)} onDel={delBook}/>)}</div></div>)}
  </div>

  {showUp&&<Upload onClose={()=>setShowUp(false)} onDone={(meta,chData)=>{
    setShowUp(false); setBooks(prev=>[meta,...prev]);
    setActive({book:meta,chapters:chData});
  }}/>}
</div>);
```

}

ReactDOM.render(<App/>, document.getElementById(“root”));
</script>

</body>
</html>
